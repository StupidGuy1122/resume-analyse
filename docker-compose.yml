version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: resume-analyse-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: resume-analyse-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      - ollama

  frontend:
    build: ./frontend
    container_name: resume-analyse-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  ollama_data:
